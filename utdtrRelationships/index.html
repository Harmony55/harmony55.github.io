<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UTDR Parralels</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://harmony55.github.io/utdtrRelationships">
    <meta property="og:title" content="UTDR Parallels">
    <meta property="og:description" content="Les parallèles et relations des différents personnages de Deltarune">
    <meta property="og:image" content="https://i.redd.it/2dlcvgwjuvwd1.jpeg">
  
</head>
<body>

<div id="topbar">
  <span>UTDR Parallels</span>
  <button class="tab-btn active" data-mode="relationships">Relations</button>
  <button class="tab-btn" data-mode="parallels">Parallèles</button>
</div>

<div id="layout">
  <div id="map-wrap">
    <canvas id="map-canvas"></canvas>
    <div id="legend">
    </div>
    <div id="node-tooltip"></div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">[ INFO ]</div>
    <div id="info-panel">
      <div id="info-placeholder">Clique sur une connection pour la voir ici.</div>
      <div id="info-content" style="display:none"></div>
    </div>
    <div id="filter-header">MONTRER / CACHER DES CONNECTIONS</div>
    <div id="filter-list">
    </div>
  </div>
</div>


<script src="./script.js"></script> 
</body>
</html>
